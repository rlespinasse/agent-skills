# Skill Evals — run agent skill evaluations using promptfoo + Claude Code CLI.
#
# This workflow uses Claude Code as both the response provider and the LLM judge.
# Each eval requires ~2 Claude Code calls (generate + judge).
# The full suite (~90 evals) takes significant rate limit budget on a Max subscription.
#
# Currently runs via Claude Code CLI (no API key needed).
# With sponsor support, this could use the Anthropic API for faster, parallelized runs.
# Sponsor this project: https://github.com/sponsors/rlespinasse

name: Evals

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill to evaluate (leave empty for all skills)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  eval:
    name: Run Evals
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        uses: taiki-e/install-action@fd0f63e180a477d7434580b6d80817978b9ff2b8 # v2.70.1
        with:
          tool: just

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate eval config
        run: |
          if [ -n "${{ inputs.skill }}" ]; then
            node scripts/generate-eval-config.js "${{ inputs.skill }}"
          else
            node scripts/generate-eval-config.js
          fi

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx -y promptfoo@latest eval --no-cache --output results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-results
          path: |
            results.json
            promptfooconfig.yaml
            promptfoo-tests.json
