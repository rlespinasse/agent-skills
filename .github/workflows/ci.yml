name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - '**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install just
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Autofix
        run: just autofix

      - name: Verify no unfixed changes
        run: |
          if ! git diff --exit-code; then
            echo "❌ Generated files are out of sync or formatting issues remain."
            echo ""
            echo "Run 'just autofix' locally, then commit and push the changes."
            git diff
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Run Python tests
        run: just test-python
