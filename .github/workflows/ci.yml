name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - '**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install just
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'

      - name: Autofix
        run: just autofix

      - name: Verify no unfixed changes
        run: |
          if ! git diff --exit-code; then
            echo "❌ Generated files are out of sync or formatting issues remain."
            echo ""
            echo "Run 'just autofix' locally, then commit and push the changes."
            git diff
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Run Python tests
        run: just test-python
