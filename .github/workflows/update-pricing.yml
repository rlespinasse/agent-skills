name: Update Pricing

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-pricing:
    name: Check for pricing changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and check pricing
        id: check
        run: |
          EXIT_CODE=0
          just check-pricing || EXIT_CODE=$?

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" -eq 1 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::check-pricing failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-pricing
          commit-message: 'chore(claude-code-usage-report): update pricing data'
          title: 'chore(claude-code-usage-report): update pricing data'
          body: |
            ## Summary

            - Automated pricing update detected from [Anthropic pricing page](https://docs.anthropic.com/en/docs/about-claude/pricing)
            - Updated `skills/claude-code-usage-report/scripts/pricing.json`

            Please review the changes to ensure they are correct.
            Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for extraction details and any errors.

            🤖 Generated by the update-pricing workflow
          labels: dependencies
